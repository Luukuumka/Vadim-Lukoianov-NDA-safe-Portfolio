<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Tiger MTX</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 20px;
    background: #111;
    color: #fff;
  }

  a {
    color: #aaa;
    text-decoration: none;
  }

  a:hover {
    color: #fff;
  }

  #login {
    text-align: center;
    margin-top: 50px;
  }

  #login input {
    padding: 8px;
    border-radius: 6px;
    border: none;
    margin-right: 10px;
  }

  #login button {
    padding: 8px 16px;
    border-radius: 6px;
    border: none;
    background: #222;
    color: #fff;
    cursor: pointer;
  }

  #login button:hover {
    background: #555;
  }

  h1, h2 {
    margin-top: 20px;
  }

  .meta {
    color: #ccc;
    margin-bottom: 10px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 10px;
    margin-top: 20px;
  }

  .grid img {
    width: 100%;
    border-radius: 10px;
    cursor: pointer;
    transition: transform 0.3s;
  }

  .grid img:hover {
    transform: scale(1.05);
  }

  #lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.9);
    z-index: 9999;
    align-items: center;
    justify-content: center;
  }

  #lightbox img {
    max-width: 90%;
    max-height: 90%;
    border-radius: 12px;
    box-shadow: 0 20px 60px rgba(0,0,0,.6);
    cursor: zoom-out;
  }
</style>
</head>
<body>

<!-- Блок пароля -->
<div id="login">
  <h2>Enter password</h2>
  <input type="password" id="pw" placeholder="Password">
  <button onclick="checkPw()">Enter</button>
</div>

<!-- Контент проекта -->
<div id="content" style="display:none;">

  <a href="../index.html">← Back</a>

  <h2>Tiger MTX</h2>

  <div class="meta">
    Hard Surface 3D Artist — full-cycle asset creation from low/high poly modeling, rigging and animations to engine integration.
  </div>

  <p class="meta">Model: 1 UV set, 2K</p>

  <div class="grid">
    <img src="../images/tiger_01.jpg" onclick="openLightbox(this.src)">
    <img src="../images/tiger_02.jpg" onclick="openLightbox(this.src)">
    <img src="../images/tiger_03.jpg" onclick="openLightbox(this.src)">
    <img src="../images/tiger_04.jpg" onclick="openLightbox(this.src)">
    <img src="../images/tiger_05.jpg" onclick="openLightbox(this.src)">
  </div>

  <p>
    <a href="https://example.com" target="_blank">
      Official studio news
    </a>
  </p>

</div>

<!-- Lightbox -->
<div id="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img" src="">
</div>

<script>
  const correctPw = "PortfolioMTX";

  function checkPw() {
    const input = document.getElementById("pw").value.trim();
    if (input === correctPw) {
      localStorage.setItem("auth", "true");
      showContent();
    } else {
      alert("Incorrect password");
    }
  }

  function showContent() {
    document.getElementById("login").style.display = "none";
    document.getElementById("content").style.display = "block";
  }

  window.onload = () => {
    if (localStorage.getItem("auth") === "true") {
      showContent();
    }
  };

  function openLightbox(src) {
    document.getElementById("lightbox-img").src = src;
    document.getElementById("lightbox").style.display = "flex";
  }

  function closeLightbox() {
    document.getElementById("lightbox").style.display = "none";
  }
</script>

</body>
</html>
